name: Auto-Sync Fork

on:
  schedule:
    - cron: '0 * * * *' # Runs automatically every hour at minute 0
  workflow_dispatch: # Allows you to manually trigger the sync from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo sync ${{ github.repository }} --branch main
